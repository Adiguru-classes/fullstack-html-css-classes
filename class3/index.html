<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anchor tag and different links</title>
</head>
<body>
    
<!-- anchor tag -->
 <!-- external link -which navigates to an other external website -->
<a href="https://google.com">
Open Google
</a>

<!-- internal link -->
 <a href="about.html">
Go to About Page
</a>

<!-- open link in new tab -->
 <a href="https://youtube.com"
target="_blank">
Open YouTube
</a>

<!-- images as link -->
 <a href="https://youtube.com">

<img
src="https://picsum.photos/200">

</a>

<!-- same page link -->
 <a href="#contact">
Go to Contact
</a>
<h2 id="contact">
Contact Section
</h2>



</body>
</html>
