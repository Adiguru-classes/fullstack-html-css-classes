<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <link rel="stylesheet" href="style.css">
    <style>
       
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.navbar{
    display:flex;
    justify-content:space-between;
    /* gap:30px; */
    align-items:center;

    padding:20px 40px;

    background-color:black;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
}

.login-btn{
    background-color:green;
    color:white;

    border:none;

    padding:10px 20px;

    border-radius:5px;

    cursor:pointer;
}
    </style>
</head>
<body>

    <nav class="navbar">

        <div class="logo">
            AdiGuru
        </div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>


        <div>
            <button class="login-btn">
                Login
            </button>
        </div>

    </nav>

</body>
</html>1
