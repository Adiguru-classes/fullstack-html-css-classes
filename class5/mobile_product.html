<!DOCTYPE html>
<html>
<head>

<style>

.product{

height:400px;

background-color:lightyellow;

border-radius:20px;

padding:20px;

margin:50px;

text-align:center;

}

img{

width:150px;

height:150px;

}

h2{

color:blue;

font-size:30px;

}

button{

}

</head>

<p>Price: ₹80,000</p>

</html>
