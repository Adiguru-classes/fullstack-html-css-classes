<!DOCTYPE html>
<html>
<head>
<style>

.card{

width:300px;

height:350px;

background-color:lightgray;

border:3px solid black;

border-radius:20px;

padding:20px;

margin:40px;

text-align:center;

}

img{

width:120px;

height:120px;

border-radius:50%;

}

h2{

color:blue;

}

button{

background-color:green;

color:white;

padding:10px;

border-radius:10px;

}

button:hover{

background-color:red;

}

</style>
</head>

<body>

<div class="card">

<img src="https://picsum.photos/200">

<h2>Raj Kumar</h2>

<p>Frontend Developer</p>

<p>Learning HTML & CSS</p>

<button>Follow</button>

</div>

</body>
</html>
