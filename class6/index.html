<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css properties</title>

<style>

.card{

width:300px;

padding:20px;

background-color:lightblue;

text-align:center;

border-radius:15px;

box-shadow:5px 5px 10px gray;

}

h1{

font-family:cursive;

font-weight:bold;

text-transform:uppercase;

}

button:hover{

background-color:red;

}

</style>


</head>
<body>
    <div class="card">

<h1>Frontend Class</h1>

<p>Learn CSS</p>

<button>Start</button>

</div>
</body>
</html>
